    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      /* Custom scrollbar for webkit browsers */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1; /* Light gray track */
      }
      ::-webkit-scrollbar-thumb {
        background: #0d9488; /* Primary color thumb */
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #0f766e; /* Darker primary on hover */
      }
      /* For Firefox */
      * {
        scrollbar-width: thin;
        scrollbar-color: #0d9488 #f1f1f1; /* thumb track */
      }

      /* Print specific styles for PDF generation and browser print */
      #print-root { 
        display: none; /* Hidden by default */
        /* For html2canvas, we might need it to be in the DOM flow but off-screen */
      }
      
      .printable-area {
        width: auto; /* Default auto width */
        margin: 0;
        padding: 0; /* Padding will be handled by specific printable components */
        font-size: 10pt;
        line-height: 1.3;
        color: #000 !important;
        background-color: #fff !important; /* Ensure white background for canvas capture */
      }
      .printable-area * {
          color: #000 !important;
          background-color: transparent !important;
          box-shadow: none !important;
          /* text-shadow: none !important; */ /* Might be useful */
      }
      .printable-area .no-print {
          display: none !important;
      }
      /* Styles for when body.printing is active (used by html2canvas) */
      body.printing #print-root {
        display: block; /* Make it visible for html2canvas */
        position: fixed; /* Position it off-screen or in a way that doesn't disrupt user view */
        left: -2000px; /* Move far off-screen to the left */
        top: 0;
        z-index: -1; /* Ensure it's behind everything if it briefly flashes */
        background: white; /* Ensure canvas background is white */
      }
      body.printing #root {
        /* Optionally hide main app if it interferes, but off-screen positioning should be enough */
        /* display: none !important; */
      }


      @media print {
        body > #root {
          display: none !important; 
        }
        #print-root {
          display: block !important; 
        }
        .printable-area {
            /* These styles are more for browser's direct print.
               html2canvas will capture what's rendered based on normal CSS.
               The .printable-area styles above are more critical for html2canvas. */
            padding: 10mm; /* A4-like padding for direct browser print */
            box-sizing: border-box;
        }
        .printable-area table {
          width: 100%;
          border-collapse: collapse;
          margin-top: 0.5em;
          margin-bottom: 0.5em;
        }
        .printable-area th, .printable-area td {
          border: 1px solid #ccc; 
          padding: 4px;
          text-align: left;
        }
        .printable-area h1, .printable-area h2, .printable-area h3, .printable-area h4, .printable-area p {
          margin-bottom: 0.3em;
        }
      }
    </style>
